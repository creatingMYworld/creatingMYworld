<rect x="1000" y="90" width="100" height="42" rx="8" fill="#161B22" stroke="#22C55E"/>
<text x="1032" y="117" fill="#86EFAC" font-size="18" font-family="Segoe UI">Java</text>

<rect x="1120" y="90" width="110" height="42" rx="8" fill="#161B22" stroke="#22C55E"/>
<text x="1147" y="117" fill="#86EFAC" font-size="18" font-family="Segoe UI">Python</text>

<rect x="1250" y="90" width="100" height="42" rx="8" fill="#161B22" stroke="#22C55E"/>
<text x="1278" y="117" fill="#86EFAC" font-size="18" font-family="Segoe UI">React</text>

<rect x="1370" y="90" width="90" height="42" rx="8" fill="#161B22" stroke="#22C55E"/>
<text x="1393" y="117" fill="#86EFAC" font-size="18" font-family="Segoe UI">SQL</text>

<!-- Bottom Wave -->
<path
d="M0 340 C250 300 500 380 750 340 C1000 300 1250 370 1500 330 L1500 400 L0 400 Z"
