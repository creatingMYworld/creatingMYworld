<svg width="1500" height="400" viewBox="0 0 1500 400" fill="none" xmlns="http://www.w3.org/2000/svg">

<defs>

<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
  <stop offset="0%" stop-color="#0D1117"/>
  <stop offset="100%" stop-color="#111827"/>
</linearGradient>

<linearGradient id="title" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#8BFFB5"/>
  <stop offset="100%" stop-color="#22C55E"/>
</linearGradient>

<linearGradient id="wave" x1="0%" y1="0%" x2="100%" y2="0%">
  <stop offset="0%" stop-color="#22C55E" stop-opacity="0.10"/>
  <stop offset="100%" stop-color="#22C55E" stop-opacity="0.45"/>
</linearGradient>

</defs>

<!-- Background -->
<rect width="1500" height="400" fill="url(#bg)"/>

<!-- Decorative circles -->
<circle cx="1240" cy="80" r="3" fill="#22C55E"/>
<circle cx="1320" cy="130" r="2" fill="#86EFAC"/>
<circle cx="1400" cy="70" r="4" fill="#16A34A"/>
<circle cx="1180" cy="180" r="2" fill="#4ADE80"/>

<!-- Name -->
<text
x="80"
y="145"
fill="url(#title)"
font-size="68"
font-weight="700"
font-family="Segoe UI, Arial, sans-serif">

Ranga Arun Kumar

</text>

<!-- Role -->
<text
x="82"
y="195"
fill="#F3F4F6"
font-size="28"
font-family="Segoe UI, Arial, sans-serif">

Software Engineer • Full Stack Developer • Java Developer

</text>

<!-- Skills -->
<text
x="82"
y="235"
fill="#86EFAC"
font-size="22"
font-family="Segoe UI, Arial, sans-serif">

Data Analytics • Cybersecurity • AI/ML • Data Structures & Algorithms

</text>

<!-- Divider -->
<line
x1="82"
y1="255"
x2="760"
y2="255"
stroke="#22C55E"
stroke-width="2"
opacity=".5"/>

<!-- Quote -->
<text
x="82"
y="295"
fill="#9CA3AF"
font-size="20"
font-family="Segoe UI, Arial, sans-serif">

Building scalable software with clean architecture and continuous learning.

</text>

