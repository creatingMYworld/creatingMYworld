<svg width="1500" height="500" viewBox="0 0 1500 500" xmlns="http://www.w3.org/2000/svg">

<defs>

<!-- Background Gradient -->
<linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
<stop offset="0%" stop-color="#0D1117">
<animate attributeName="stop-color"
values="#0D1117;#0A1510;#0D1117"
dur="8s"
repeatCount="indefinite"/>
</stop>

<stop offset="100%" stop-color="#14532D">
<animate attributeName="stop-color"
values="#14532D;#16A34A;#14532D"
dur="8s"
repeatCount="indefinite"/>
</stop>

</linearGradient>

</defs>

<!-- Background -->
<rect width="1500" height="500" fill="url(#bg)"/>

<!-- Name -->
<text
x="80"
y="180"
font-size="72"
fill="white"
font-family="Inter, Segoe UI, Arial"
font-weight="700">

Ranga Arun Kumar

</text>

<!-- Role -->
<text
x="80"
y="250"
font-size="32"
fill="white"
font-family="Inter, Segoe UI, Arial">

Software Engineer • Java Developer • Full Stack Developer

</text>

<!-- Skills -->
<text
x="80"
y="310"
font-size="26"
fill="#86EFAC"
font-family="Inter, Segoe UI, Arial">

Data Analytics • Cybersecurity • AI • Data Structures & Algorithms

</text>

<!-- Decorative Line -->
<line
x1="80"
y1="340"
x2="760"
y2="340"
stroke="#22C55E"
stroke-width="2"
opacity=".6"/>

<!-- Bottom Wave -->
<path
d="M0 430 C300 380 600 470 900 420 C1200 370 1400 430 1500 390 L1500 500 L0 500Z"
fill="#22C55E"
opacity="0.18">

<animate
attributeName="d"
dur="8s"
repeatCount="indefinite"

values="
M0 430 C300 380 600 470 900 420 C1200 370 1400 430 1500 390 L1500 500 L0 500Z;

M0 420 C250 470 700 360 900 430 C1200 470 1400 380 1500 420 L1500 500 L0 500Z;

M0 430 C300 380 600 470 900 420 C1200 370 1400 430 1500 390 L1500 500 L0 500Z"/>

</path>

</svg>
